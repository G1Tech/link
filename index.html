<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f2e8;
      --panel: rgba(255, 255, 255, 0.78);
      --text: #1f1a14;
      --muted: #6e6256;
      --line: rgba(31, 26, 20, 0.12);
      --accent: #8a4b2a;
      --shadow: 0 24px 60px rgba(31, 26, 20, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(138, 75, 42, 0.12), transparent 34%),
        radial-gradient(circle at bottom right, rgba(77, 108, 94, 0.14), transparent 32%),
        linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
      color: var(--text);
    }

    .card {
      width: min(100%, 760px);
      padding: 40px 28px 24px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(76px, 18vw, 164px);
      line-height: 0.9;
      letter-spacing: -0.06em;
      font-weight: 700;
    }

    p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .info-toggle {
      position: fixed;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 132px;
      height: 34px;
      padding: 0;
      border: 0;
      background: transparent;
      color: transparent;
      font: inherit;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      z-index: 20;
      -webkit-tap-highlight-color: transparent;
    }

    .info-toggle:hover {
      opacity: 0;
    }

    .info-toggle::after {
      content: "▾";
      font-size: 11px;
      color: transparent;
      transition: transform 180ms ease;
    }

    .info-toggle[aria-expanded="true"]::after {
      transform: rotate(180deg);
    }

    .debug {
      margin-top: 18px;
      text-align: left;
      border-top: 1px solid var(--line);
      padding-top: 18px;
      display: none;
    }

    .debug.open {
      display: block;
    }

    .summary {
      margin: 0 0 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(138, 75, 42, 0.08);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    dl {
      margin: 0;
      display: grid;
      grid-template-columns: minmax(120px, 180px) 1fr;
      gap: 10px 14px;
      align-items: start;
    }

    dt {
      color: var(--muted);
      font-size: 13px;
    }

    dd {
      margin: 0;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    @media (max-width: 640px) {
      .card {
        padding: 32px 18px 20px;
        border-radius: 22px;
      }

      dl {
        grid-template-columns: 1fr;
        gap: 4px 0;
      }

      dt {
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>404</h1>
    <p>Страница не найдена.</p>

    <button class="info-toggle" id="infoToggle" type="button" aria-expanded="false" aria-controls="debugPanel" aria-label="Toggle debug info">
      info
    </button>

    <section class="debug" id="debugPanel">
      <div class="summary" id="summary"></div>
      <dl id="debugList"></dl>
    </section>
  </main>

  <script>
    (function () {
      var infoToggle = document.getElementById("infoToggle");
      var debugPanel = document.getElementById("debugPanel");
      var summary = document.getElementById("summary");
      var debugList = document.getElementById("debugList");

      function safeValue(value) {
        if (value === undefined || value === null || value === "") {
          return "n/a";
        }
        if (typeof value === "object") {
          try {
            return JSON.stringify(value, null, 2);
          } catch (error) {
            return String(value);
          }
        }
        return String(value);
      }

      function matchAny(source, patterns) {
        return patterns.some(function (pattern) {
          return pattern.test(source);
        });
      }

      function detectEnvironment() {
        var ua = navigator.userAgent || "";
        var vendor = navigator.vendor || "";
        var referrer = document.referrer || "";
        var search = window.location.search || "";
        var hostApp = "Unknown";

        if (/FBAN|FBAV|Instagram|Line\/|LinkedInApp|Twitter|X\/|Snapchat|Pinterest|Telegram|TikTok|WhatsApp/i.test(ua)) {
          if (/Instagram/i.test(ua)) hostApp = "Instagram";
          else if (/FBAN|FBAV/i.test(ua)) hostApp = "Facebook";
          else if (/Line\//i.test(ua)) hostApp = "LINE";
          else if (/LinkedInApp/i.test(ua)) hostApp = "LinkedIn";
          else if (/Twitter|X\//i.test(ua)) hostApp = "X/Twitter";
          else if (/Snapchat/i.test(ua)) hostApp = "Snapchat";
          else if (/Pinterest/i.test(ua)) hostApp = "Pinterest";
          else if (/Telegram/i.test(ua)) hostApp = "Telegram";
          else if (/TikTok/i.test(ua)) hostApp = "TikTok";
          else if (/WhatsApp/i.test(ua)) hostApp = "WhatsApp";
        }

        var isAndroid = /Android/i.test(ua);
        var isIOS = /iPhone|iPad|iPod/i.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        var platform = isAndroid ? "Android" : isIOS ? "iOS/iPadOS" : navigator.platform || navigator.userAgentData && navigator.userAgentData.platform || "Unknown";

        var isChrome = /Chrome|CriOS/i.test(ua) && !/EdgA|EdgiOS|OPR|SamsungBrowser/i.test(ua);
        var isSafari = /Safari/i.test(ua) && !/Chrome|CriOS|FxiOS|EdgiOS/i.test(ua);
        var isFirefox = /Firefox|FxiOS/i.test(ua);
        var isEdge = /EdgA|EdgiOS|Edg\//i.test(ua);
        var isSamsungBrowser = /SamsungBrowser/i.test(ua);

        var isAndroidWebView = isAndroid && (
          /\bwv\b/i.test(ua) ||
          /; wv\)/i.test(ua) ||
          (/Version\/[\d.]+/i.test(ua) && /Chrome\/[\d.]+/i.test(ua) && !/Safari\/[\d.]+/i.test(ua)) ||
          /WebView/i.test(ua)
        );

        var isiOSWebView = isIOS && (
          (!/Safari/i.test(ua) && /AppleWebKit/i.test(ua)) ||
          /; wv/i.test(ua)
        );

        var standalone = window.matchMedia && window.matchMedia("(display-mode: standalone)").matches;
        var navigatorStandalone = typeof navigator.standalone === "boolean" ? navigator.standalone : null;
        var isPWA = standalone || navigatorStandalone === true;

        var looksLikeInAppBrowser = matchAny(ua, [
          /FBAN|FBAV/i,
          /Instagram/i,
          /Line\//i,
          /LinkedInApp/i,
          /Twitter|X\//i,
          /Snapchat/i,
          /Pinterest/i,
          /Telegram/i,
          /TikTok/i,
          /WhatsApp/i
        ]);

        var hasTrustedChromeSignals = isAndroid && isChrome && !isAndroidWebView && vendor.indexOf("Google") !== -1;
        var customTabHint = hasTrustedChromeSignals && (
          referrer.indexOf("android-app://") === 0 ||
          /[?&](utm_source|browser_fallback_url|referrer)=/i.test(search)
        );

        var shellType = "Unknown browser shell";
        if (isPWA) {
          shellType = "Installed PWA / standalone mode";
        } else if (looksLikeInAppBrowser) {
          shellType = "In-app browser";
        } else if (isAndroidWebView || isiOSWebView) {
          shellType = "Embedded WebView";
        } else if (customTabHint) {
          shellType = "Android Custom Tab (heuristic)";
        } else if (isChrome) {
          shellType = "Chrome";
        } else if (isSafari) {
          shellType = "Safari";
        } else if (isFirefox) {
          shellType = "Firefox";
        } else if (isEdge) {
          shellType = "Edge";
        } else if (isSamsungBrowser) {
          shellType = "Samsung Internet";
        }

        var browserName = "Unknown";
        if (isChrome) browserName = "Chrome";
        else if (isSafari) browserName = "Safari";
        else if (isFirefox) browserName = "Firefox";
        else if (isEdge) browserName = "Edge";
        else if (isSamsungBrowser) browserName = "Samsung Internet";

        return {
          classification: shellType,
          browser: browserName,
          hostApp: hostApp,
          platform: platform,
          hints: {
            isAndroid: isAndroid,
            isIOS: isIOS,
            isAndroidWebView: isAndroidWebView,
            isiOSWebView: isiOSWebView,
            isPWA: isPWA,
            isInAppBrowser: looksLikeInAppBrowser,
            isCustomTabHeuristic: customTabHint
          }
        };
      }

      function render() {
        var env = detectEnvironment();
        var connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection || null;
        var uaData = navigator.userAgentData || null;

        summary.textContent =
          "Тип запуска: " + env.classification +
          " | Платформа: " + env.platform +
          " | Браузер: " + env.browser +
          " | Host app: " + env.hostApp;

        var rows = [
          ["Detected shell", env.classification],
          ["Host app", env.hostApp],
          ["Platform", env.platform],
          ["Browser", env.browser],
          ["URL", window.location.href],
          ["Protocol", window.location.protocol],
          ["Referrer", document.referrer || "empty"],
          ["Window opener", window.opener ? "present" : "none"],
          ["User agent", navigator.userAgent],
          ["UA data", uaData],
          ["Vendor", navigator.vendor],
          ["Language", navigator.language],
          ["Languages", navigator.languages],
          ["Platform raw", navigator.platform],
          ["Cookies enabled", navigator.cookieEnabled],
          ["Online", navigator.onLine],
          ["Screen", window.screen.width + "x" + window.screen.height + " @" + (window.devicePixelRatio || 1) + "x"],
          ["Viewport", window.innerWidth + "x" + window.innerHeight],
          ["Color scheme", window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"],
          ["Display mode standalone", window.matchMedia && window.matchMedia("(display-mode: standalone)").matches],
          ["Navigator standalone", typeof navigator.standalone === "boolean" ? navigator.standalone : "n/a"],
          ["Touch points", navigator.maxTouchPoints],
          ["History length", window.history.length],
          ["Visibility state", document.visibilityState],
          ["Timezone", Intl.DateTimeFormat().resolvedOptions().timeZone],
          ["Timestamp", new Date().toISOString()],
          ["Connection", connection ? {
            effectiveType: connection.effectiveType,
            type: connection.type,
            downlink: connection.downlink,
            rtt: connection.rtt,
            saveData: connection.saveData
          } : "n/a"],
          ["Heuristics", env.hints]
        ];

        debugList.innerHTML = rows.map(function (entry) {
          return "<dt>" + entry[0] + "</dt><dd>" + safeValue(entry[1]) + "</dd>";
        }).join("");
      }

      infoToggle.addEventListener("click", function () {
        var isOpen = debugPanel.classList.toggle("open");
        infoToggle.setAttribute("aria-expanded", String(isOpen));
        if (isOpen && !debugList.innerHTML) {
          render();
        }
      });
    }());
  </script>
</body>
</html>
